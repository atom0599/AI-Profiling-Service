networks:
  honeypot-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET}
  app-net:
    driver: bridge

volumes:
  heralding_logs:
  honeyforge_db:
  ollama_data:
  profiling_db:

services:

  # ── PostgreSQL (Spring Boot 전용) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    networks:
      - app-net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-honeypot_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - profiling_db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot 프로파일링 서비스 ──────────────────────────────────────────────
  profiling:
    build:
      context: ../profiling-service/honeypot
      dockerfile: Dockerfile
    container_name: honeypot-profiling
    networks:
      - app-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://honeypot-postgres:5432/${POSTGRES_DB:-honeypot_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - FASTAPI_URL=http://honeypot-backend:8000
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-honeypot-internal-token}
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── FastAPI 백엔드 ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: honeypot-backend
    networks:
      - app-net
    environment:
      - PROJECT_ROOT=/project
      - LOGS_ROOT=/honeypot_logs
      - PROJECT_HOST_PATH=${PROJECT_HOST}
      - LOGS_HOST_PATH=${HONEYPOT_LOGS_HOST}
      - SECRET_KEY=${SECRET_KEY}
      - DB_DIR=/app/data
      - OLLAMA_HOST=http://honeypot-ollama:11434
      - PROFILING_URL=http://honeypot-profiling:8080
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-honeypot-internal-token}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECT_HOST}:/project:ro
      - ${HONEYPOT_LOGS_HOST}:/honeypot_logs
      - honeyforge_db:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama LLM 엔진 ──────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: honeypot-ollama
    networks:
      - app-net
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 모델 자동 다운로드 ────────────────────────────────────────────────────────
  model-pull:
    image: ollama/ollama:latest
    container_name: honeypot-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.1:8b"]
    restart: "no"

  # ── Next.js 프론트엔드 + LLM 분석 ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: honeypot-frontend
    networks:
      - app-net
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "8001:8001"
    depends_on:
      ollama:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8001/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Cowrie: SSH/Telnet 허니팟 ─────────────────────────────────────────────
  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    hostname: cowrie-ssh
    networks:
      honeypot-net:
        ipv4_address: ${COWRIE_IP}
    ports:
      - "2222:2222"
      - "2223:2223"
    volumes:
      - "./honeypots/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro"
      - "./honeypots/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro"
      - "${HONEYPOT_LOGS_HOST}/cowrie:/tmp/cowrie_logs"
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  # ── Heralding: HTTP/MySQL 인증 허니팟 ─────────────────────────────────────
  heralding:
    build:
      context: ./honeypots/heralding
      dockerfile: Dockerfile
    image: honeypot-heralding
    container_name: heralding
    hostname: heralding
    networks:
      honeypot-net:
        ipv4_address: ${HERALDING_IP}
    ports:
      - "8880:80"
      - "33306:3306"
    volumes:
      - "heralding_logs:/var/log/heralding"
    restart: unless-stopped

  # ── OpenCanary: 포트스캔/RDP/VNC 탐지 ────────────────────────────────────
  opencanary:
    build:
      context: ./honeypots/opencanary
      dockerfile: Dockerfile
    image: honeypot-opencanary
    container_name: opencanary
    hostname: opencanary
    networks:
      honeypot-net:
        ipv4_address: ${OPENCANARY_IP}
    ports:
      - "2121:21"
      - "33389:3389"
      - "55900:5900"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/opencanary:/var/log/opencanary"
    restart: unless-stopped

  # ── Tanner: SNARE 분석 서버 스텁 ─────────────────────────────────────────
  tanner:
    build:
      context: ./honeypots/tanner
      dockerfile: Dockerfile
    image: honeypot-tanner
    container_name: tanner
    hostname: tanner
    networks:
      honeypot-net:
        ipv4_address: ${TANNER_IP}
    restart: unless-stopped

  # ── SNARE: 웹 공격 허니팟 ──────────────────────────────────────────────────
  snare:
    build:
      context: ./honeypots/snare
      dockerfile: Dockerfile
    image: honeypot-snare
    container_name: snare
    hostname: snare
    networks:
      honeypot-net:
        ipv4_address: ${SNARE_IP}
    ports:
      - "8080:8080"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/snare:/opt/snare"
    restart: unless-stopped

  # ── Dionaea: SMB/멀웨어 허니팟 ───────────────────────────────────────────
  dionaea:
    image: dinotools/dionaea:latest
    container_name: dionaea
    hostname: dionaea
    networks:
      honeypot-net:
        ipv4_address: ${DIONAEA_IP}
    ports:
      - "4445:445"
      - "4421:21"
      - "14433:1433"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/dionaea:/opt/dionaea/var/log/dionaea"
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  # ── Mailoney: SMTP 허니팟 ─────────────────────────────────────────────────
  mailoney:
    build:
      context: ./honeypots/mailoney
      dockerfile: Dockerfile
    image: honeypot-mailoney
    container_name: mailoney
    hostname: mailoney
    networks:
      honeypot-net:
        ipv4_address: ${MAILONEY_IP}
    ports:
      - "2525:25"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/mailoney:/var/log/mailoney"
    restart: unless-stopped

  # ── Conpot: ICS/SCADA 허니팟 ─────────────────────────────────────────────
  conpot:
    build:
      context: ./honeypots/conpot
      dockerfile: Dockerfile
    image: honeypot-conpot
    container_name: conpot
    hostname: conpot
    networks:
      honeypot-net:
        ipv4_address: ${CONPOT_IP}
    ports:
      - "10102:102"
      - "5502:502"
      - "16100:161/udp"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/conpot:/var/log/conpot"
    restart: unless-stopped

  # ── Kali: 공격자 컨테이너 ────────────────────────────────────────────────
  kali:
    build:
      context: ./kali
      dockerfile: Dockerfile
    container_name: kali-attacker
    hostname: kali
    networks:
      honeypot-net:
        ipv4_address: ${KALI_IP}
    volumes:
      - "./attack_scenarios:/attack_scenarios"
      - "./scripts:/scripts"
      - "${HONEYPOT_LOGS_HOST}:/honeypot_logs"
      - "heralding_logs:/heralding_logs"
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: "no"
