[dionaea]
download.dir=/opt/dionaea/var/lib/dionaea/downloads
modules=python,curl,nfq,emu,pcap

[logging]
default=file:///opt/dionaea/var/log/dionaea/dionaea.log
levels=warning,error,info

[database]
sqlite.file=/opt/dionaea/var/log/dionaea/logsql.sqlite

[listen]
mode=getifaddrs
interfaces=eth0

[module.smb]
[module.ftp]
[module.mssql]
[module.tftp]
[module.http]
