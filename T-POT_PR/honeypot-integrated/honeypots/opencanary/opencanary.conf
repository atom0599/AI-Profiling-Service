{
    "device.node_id": "opencanary-1",
    "git.enabled": false,
    "ftp.enabled": true,
    "ftp.port": 21,
    "ftp.banner": "FTP server ready",
    "http.enabled": false,
    "http.port": 80,
    "mysql.enabled": false,
    "rdp.enabled": true,
    "rdp.port": 3389,
    "smb.enabled": false,
    "snmp.enabled": false,
    "ssh.enabled": false,
    "telnet.enabled": false,
    "vnc.enabled": true,
    "vnc.port": 5900,
    "portscan.enabled": false,
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {"format": "%(message)s"}
            },
            "handlers": {
                "file": {
                    "class": "logging.FileHandler",
                    "filename": "/var/log/opencanary/opencanary.log",
                    "delay": true
                }
            }
        }
    }
}
